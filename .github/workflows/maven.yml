name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    # Étape 1b: Vérification du formatage (Google Java Style)
    - name: Check formatting
      uses: axel-op/googlejavaformat-action@v3
      with:
        args: "--check" # Vérifie sans modifier les fichiers

    # Étape 1a: Lancement des tests
    - name: Build and Test with Maven
      run: mvn -B package --file pom.xml
